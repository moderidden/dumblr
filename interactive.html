<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive — Dumblr</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/site.css" />

  <script type="application/json" id="collection-config">
  {
    "type": "interactive",
    "title": "Interactive",
    "sortOptions": ["date"],
    "defaultSort": "date"
  }
  </script>
</head>
<body>

  <header class="site-header">
    <a href="/" class="site-title">Dumblr</a>
    <div class="header-actions">
      <button id="random-btn" title="Random interactive entry">&#9862; random</button>
      <button id="theme-toggle" aria-label="Toggle theme">&#9788;</button>
    </div>
  </header>

  <div class="site-layout">
    <aside class="site-sidebar">
      <nav>
        <div class="nav-section">
          <span class="sidebar-section-label">log</span>
          <a href="movies.html" class="sidebar-link">movies</a>
          <a href="books.html" class="sidebar-link">books</a>
          <a href="theater.html" class="sidebar-link">shows</a>
          <a href="meals.html" class="sidebar-link">meals</a>
        </div>
        <div class="nav-section">
          <span class="sidebar-section-label">life</span>
          <a href="notes.html" class="sidebar-link">notes</a>
          <a href="memories.html" class="sidebar-link">memories</a>
          <a href="travel.html" class="sidebar-link">travel</a>
          <a href="shelf.html" class="sidebar-link">shelf</a>
          <a href="outfits.html" class="sidebar-link">outfits</a>
        </div>
        <div class="nav-section">
          <span class="sidebar-section-label">for fun</span>
          <a href="quotes.html" class="sidebar-link">quotes</a>
          <a href="interactive.html" class="sidebar-link active">apps</a>
          <a href="top5.html" class="sidebar-link">top 5</a>
          <a href="press-passes.html" class="sidebar-link">press passes</a>
        </div>
      </nav>
    </aside>


  <main class="site-main">
    <h1 class="collection-heading">Interactive</h1>
    <div class="collection-controls">
      <span class="collection-count" id="collection-count"></span>
      <div class="sort-controls" id="sort-controls"></div>
    </div>
    <div id="collection-grid" class="entry-grid"></div>
    <p id="empty-state" class="empty-state hidden">No interactive entries yet.</p>
  </main>
  </div><!-- /.site-layout -->

  <footer class="site-footer">
    <a href="/" class="footer-home-link">← all entries</a>
  </footer>

  <script src="assets/js/collection.js"></script>
</body>
</html>
