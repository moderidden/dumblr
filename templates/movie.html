<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MOVIE TITLE — Dumblr</title>

  <!--
    ╔══════════════════════════════════════════════════════════════╗
    ║  MOVIE ENTRY METADATA                                        ║
    ║  Fill in every field. The build script reads this block      ║
    ║  to add the entry to manifest.json automatically.            ║
    ╠══════════════════════════════════════════════════════════════╣
    ║  title        The movie's name                               ║
    ║  date         When you watched it — YYYY-MM-DD               ║
    ║  type         Must stay exactly "movie"                      ║
    ║  description  SHORT REVIEW shown on the card (1–3 sentences) ║
    ║  pinned       true to show in the pinned section, else false  ║
    ║  rating       0 to 5, halves ok — e.g. 4.5                   ║
    ║  director     Director's name                                ║
    ║  year         Release year (a number, not a string)          ║
    ║  where        Where you watched — e.g. "AMC", "home", "Max"  ║
    ║  with         Who you watched with — use [] if alone         ║
    ╚══════════════════════════════════════════════════════════════╝
  -->
  <script type="application/json" id="entry-meta">
  {
    "title": "MOVIE TITLE",
    "date": "YYYY-MM-DD",
    "type": "movie",
    "description": "SHORT REVIEW — shown on the card. 1–3 sentences.",
    "tags": [],
    "pinned": false,
    "rating": 4.5,
    "director": "Director Name",
    "year": 2024,
    "where": "home",
    "with": ["Person A"]
  }
  </script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f9f7f4;
      color: #1a1a1a;
      padding: 3rem 1.5rem;
      max-width: 640px;
      margin: 0 auto;
      line-height: 1.7;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #141414; color: #e8e6e2; }
      a { color: #7fa8ff; }
      .meta { color: #666; }
    }
    .back-link { font-size: 0.78rem; font-family: monospace; color: #888; text-decoration: none; display: inline-block; margin-bottom: 2.5rem; }
    .back-link:hover { color: #555; }
    h1 { font-size: 1.65rem; font-weight: 700; letter-spacing: -0.03em; line-height: 1.15; margin-bottom: 0.35rem; }
    .rating { font-size: 1rem; margin-bottom: 0.4rem; color: #e8a020; letter-spacing: 1px; }
    .meta { font-size: 0.78rem; font-family: monospace; color: #888; margin-bottom: 2rem; }
    .review p { margin-bottom: 1.2rem; font-size: 1rem; }
  </style>
</head>
<body>

  <a href="/" class="back-link">← back</a>

  <h1>MOVIE TITLE</h1>
  <!-- Update the stars and number to match your rating field above -->
  <div class="rating">★★★★½ &nbsp;(4.5 / 5)</div>
  <div class="meta">Directed by DIRECTOR · YEAR · Watched: WHERE</div>

  <!-- ═══════════════════════════════════════════════
       FULL REVIEW / NOTES
       Write as much or as little as you want below.
       This only appears when someone opens the entry.
       ═══════════════════════════════════════════════ -->
  <section class="review">
    <p>Your full review goes here. No length limit.</p>
    <p>Add more paragraphs as needed.</p>
  </section>

</body>
</html>
