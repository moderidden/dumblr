<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BOOK TITLE — Dumblr</title>

  <!--
    ╔══════════════════════════════════════════════════════════════╗
    ║  BOOK ENTRY METADATA                                         ║
    ╠══════════════════════════════════════════════════════════════╣
    ║  title        The book's name                                ║
    ║  date         When you finished it — YYYY-MM-DD              ║
    ║  type         Must stay exactly "book"                       ║
    ║  description  SHORT REVIEW shown on the card (1–3 sentences) ║
    ║  pinned       true or false                                  ║
    ║  rating       0 to 5, halves ok — e.g. 4.5                   ║
    ║  author       Author's name                                  ║
    ║  year         Publication year (a number)                    ║
    ║  genre        e.g. "literary fiction", "sci-fi", "memoir"    ║
    ╚══════════════════════════════════════════════════════════════╝
  -->
  <script type="application/json" id="entry-meta">
  {
    "title": "BOOK TITLE",
    "date": "YYYY-MM-DD",
    "type": "book",
    "description": "SHORT REVIEW — shown on the card. 1–3 sentences.",
    "tags": [],
    "pinned": false,
    "rating": 4,
    "author": "Author Name",
    "year": 2023,
    "genre": "fiction"
  }
  </script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f9f7f4;
      color: #1a1a1a;
      padding: 3rem 1.5rem;
      max-width: 640px;
      margin: 0 auto;
      line-height: 1.7;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #141414; color: #e8e6e2; }
      a { color: #7fa8ff; }
      .meta { color: #666; }
    }
    .back-link { font-size: 0.78rem; font-family: monospace; color: #888; text-decoration: none; display: inline-block; margin-bottom: 2.5rem; }
    .back-link:hover { color: #555; }
    h1 { font-size: 1.65rem; font-weight: 700; letter-spacing: -0.03em; line-height: 1.15; margin-bottom: 0.35rem; }
    .meta { font-size: 0.78rem; font-family: monospace; color: #888; margin-bottom: 0.4rem; }
    .rating { font-size: 1rem; margin-bottom: 2rem; color: #e8a020; letter-spacing: 1px; }
    .review p { margin-bottom: 1.2rem; font-size: 1rem; }
  </style>
</head>
<body>

  <a href="/" class="back-link">← back</a>

  <h1>BOOK TITLE</h1>
  <div class="meta">AUTHOR · YEAR · GENRE</div>
  <!-- Update the stars and number to match your rating field above -->
  <div class="rating">★★★★☆ &nbsp;(4 / 5)</div>

  <!-- ═══════════════════════════════════════════════
       FULL REVIEW / NOTES
       ═══════════════════════════════════════════════ -->
  <section class="review">
    <p>Your full review goes here.</p>
  </section>

</body>
</html>
