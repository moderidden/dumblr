<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Top 5 — Dumblr</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/site.css" />

  <style>
    .top5-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.5rem;
      align-items: start;
    }

    .notebook-paper {
      border-radius: 4px;
      box-shadow: 3px 4px 18px rgba(0,0,0,0.25), 0 0 0 1px rgba(0,0,0,0.07);
      overflow: hidden;
      background: white;
    }

    .notebook-head {
      padding: 1.4rem 2rem 1rem;
      background: white;
      border-bottom: 2.5px solid #e87878;
    }

    .notebook-head h2 {
      font-family: 'Caveat', cursive;
      font-size: 1.65rem;
      font-weight: 700;
      color: #111;
      margin: 0;
      line-height: 1.2;
    }

    .notebook-body {
      background: white;
      padding: 0 2rem 0.8rem;
    }

    .notebook-rule {
      height: 0.7rem;
      border-bottom: 1px solid #8cbde8;
      margin: 0 -2rem;
    }

    .notebook-list {
      list-style: none;
      padding: 0;
      margin: 0;
      counter-reset: item;
    }

    .notebook-list li {
      font-family: 'Caveat', cursive;
      font-size: 1.45rem;
      line-height: 2.5rem;
      counter-increment: item;
      color: #1a1a5e;
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      background-image: repeating-linear-gradient(
        transparent 0,
        transparent calc(2.5rem - 1px),
        #8cbde8 calc(2.5rem - 1px),
        #8cbde8 2.5rem
      );
      background-size: 100% 2.5rem;
      margin: 0 -2rem;
      padding: 0 2rem;
    }

    .notebook-list li::before {
      content: counter(item) ".";
      font-family: 'Caveat', cursive;
      font-size: 1.2rem;
      color: #bbb;
      flex-shrink: 0;
      width: 1.6rem;
      text-align: right;
    }
  </style>
</head>
<body>

  <header class="site-header">
    <a href="/" class="site-title">Dumblr</a>
    <div class="header-actions">
      <button id="theme-toggle" aria-label="Toggle theme">&#9788;</button>
    </div>
  </header>

  <div class="site-layout">
    <aside class="site-sidebar">
      <nav>
        <div class="nav-section">
          <span class="sidebar-section-label">log</span>
          <a href="movies.html" class="sidebar-link">movies</a>
          <a href="books.html" class="sidebar-link">books</a>
          <a href="theater.html" class="sidebar-link">shows</a>
          <a href="meals.html" class="sidebar-link">meals</a>
        </div>
        <div class="nav-section">
          <span class="sidebar-section-label">life</span>
          <a href="notes.html" class="sidebar-link">notes</a>
          <a href="memories.html" class="sidebar-link">memories</a>
          <a href="travel.html" class="sidebar-link">travel</a>
          <a href="shelf.html" class="sidebar-link">shelf</a>
          <a href="outfits.html" class="sidebar-link">outfits</a>
        </div>
        <div class="nav-section">
          <span class="sidebar-section-label">for fun</span>
          <a href="quotes.html" class="sidebar-link">quotes</a>
          <a href="interactive.html" class="sidebar-link">apps</a>
          <a href="top5.html" class="sidebar-link active">top 5</a>
          <a href="press-passes.html" class="sidebar-link">press passes</a>
        </div>
      </nav>
    </aside>

  <main class="site-main">
    <h1 class="collection-heading">Top 5</h1>

    <div class="top5-grid">

      <div class="notebook-paper">
        <div class="notebook-head">
          <h2>Top 5 Movies of 2025</h2>
        </div>
        <div class="notebook-body">
          <div class="notebook-rule"></div>
          <ol class="notebook-list">
            <li>One Battle After Another</li>
            <li>Marty Supreme</li>
            <li>Sinners</li>
            <li>Wake Up, Dead Man</li>
            <li>Sentimental Value</li>
          </ol>
        </div>
      </div>

    </div>
  </main>
  </div><!-- /.site-layout -->

  <footer class="site-footer">
    <a href="/" class="footer-home-link">← all entries</a>
  </footer>

  <script>
    (function() {
      const el = document.querySelector('.site-title');
      if (!el) return;
      el.innerHTML = 'D<span class="title-insert">avid\'s T</span>umblr';
    })();
    (function() {
      const saved = localStorage.getItem('theme') || 'auto';
      document.documentElement.setAttribute('data-theme', saved);
    })();
    document.getElementById('theme-toggle').addEventListener('click', () => {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme');
      const next = current === 'auto' ? 'dark' : current === 'dark' ? 'light' : 'auto';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });
  </script>
</body>
</html>
